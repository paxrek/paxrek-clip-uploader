<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TikTok Authorization Complete</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 760px; margin: 48px auto; padding: 0 20px; line-height: 1.55; color: #171717; }
    code { background: #f2f2f2; padding: 2px 5px; border-radius: 4px; }
    textarea { width: 100%; min-height: 120px; font-family: Consolas, monospace; }
  </style>
</head>
<body>
  <h1>TikTok Authorization Complete</h1>
  <p>
    Copy the full URL from your browser address bar and paste it into the local
    authorization command when prompted.
  </p>
  <p>The current redirected URL is:</p>
  <textarea id="url" readonly></textarea>
  <script>
    document.getElementById("url").value = window.location.href;
  </script>
</body>
</html>
